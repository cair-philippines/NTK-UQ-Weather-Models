name: Publish

# Push a version tag (e.g. v0.1.0) -> build, then publish to PyPI.
# Manually trigger ("Run workflow") -> publish to TestPyPI for a dry run.
# Publishing uses PyPI Trusted Publishing (OIDC): no API token stored in GitHub.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:        # manual TestPyPI dry run

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          echo "pyproject version: $PKG | tag: $TAG"
          test "$PKG" = "$TAG" || { echo "::error::tag v$TAG does not match pyproject version $PKG"; exit 1; }

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  testpypi:
    # Manual dry run only.
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi:
    # Real release: only on a pushed version tag.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
