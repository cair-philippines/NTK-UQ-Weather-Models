name: Release

# One-click release from the GitHub UI (Actions -> Release -> Run workflow).
# Pick the bump (patch/minor/major) and the target (testpypi for a dry run, or
# pypi for the real thing). The workflow bumps the version in pyproject.toml,
# commits it, creates and pushes the matching tag, builds, and publishes.
# No manual `git tag` and no API token (PyPI Trusted Publishing via OIDC).

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semantic version bump"
        type: choice
        options: [patch, minor, major]
        default: patch
      target:
        description: "Where to publish"
        type: choice
        options: [testpypi, pypi]
        default: testpypi

jobs:
  release:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}
    permissions:
      contents: write      # push the bump commit + tag
      id-token: write      # trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bump version in pyproject.toml
        id: bump
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          NEW=$(python - <<'PY'
          import os, re, pathlib
          p = pathlib.Path("pyproject.toml")
          s = p.read_text()
          m = re.search(r'^version = "(\d+)\.(\d+)\.(\d+)"', s, re.M)
          a, b, c = map(int, m.groups())
          bump = os.environ["BUMP"]
          if bump == "major": a, b, c = a + 1, 0, 0
          elif bump == "minor": b, c = b + 1, 0
          else: c += 1
          new = f"{a}.{b}.{c}"
          p.write_text(re.sub(r'^version = "\d+\.\d+\.\d+"', f'version = "{new}"', s, count=1, flags=re.M))
          print(new)
          PY
          )
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW"

      - name: Run tests
        run: |
          pip install -e . pytest
          pytest tests/ -q

      - name: Commit, tag, and push
        env:
          NEW: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "release: v${NEW}"
          git tag "v${NEW}"
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin "v${NEW}"

      - name: Build
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to TestPyPI
        if: inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: inputs.target == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
